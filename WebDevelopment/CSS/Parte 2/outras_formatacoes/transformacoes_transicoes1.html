<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método translate</title>

    <style>

        .div1{transform: translateX(80px);}

        .div2{transform: translateY(80px);}

        .div3{transform: translate(80px, 100px);}

        div{
            background-color: grey;
            width: 150px;
            height: 100px;
        }

    </style>
</head>
<body>
    <div>Eu &#9829; CSS! div</div>
    <br>
    <br>
    <br>
    <br>
    <div class="div1">Eu &#9829; CSS! div1</div>
    <br>
    <br>
    <br>
    <br>
    <div class="div2">Eu &#9829; CSS! div2</div>
    <br>
    <br>
    <br>
    <br>
    <div class="div3">Eu &#9829; CSS! div3</div>
</body>
</html>
