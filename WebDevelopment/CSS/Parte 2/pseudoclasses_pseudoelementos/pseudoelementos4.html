<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-elemento</title>
    <style>
        ::selection{
            color: red;
            background: yellow;
        }
    </style>
</head>
<body>
    <h1>Selecione algum texto nesta página:</h1>

    <p>Isso é um parágrafo.</p>

    <div>Este é algum texto em algum elemento div.</div>
</body>
</html>
