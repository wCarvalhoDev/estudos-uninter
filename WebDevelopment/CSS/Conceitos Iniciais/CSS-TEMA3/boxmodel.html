<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        div{
            width: 350px;
            padding: 10px;
            border: 5px dotted green;
            margin: 0;
            background-color: burlywood;
            
            /*box sixing border box faz com que toda essa medida fique dentro do 350px, se nao tiver box sizing, estrapola pra fora da tela, chegando aos 380px. com border box a largura maxima é 350px e nao estrapola pra fora da tela.*/
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <br><br><br><br>
    <div>Conteúdo</div>
</body>
</html>
